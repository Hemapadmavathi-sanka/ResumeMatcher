# ===== DATABASE CONFIG =====
spring.datasource.url=jdbc:mysql://localhost:3306/resumematcher_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=Hema@2001
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== SERVER =====
server.port=8080

# ===== JWT =====
app.jwt.secret=YourSuperSecretJWTKeyThatIsAtLeast256BitsLongForHMACSHA256Algorithm!
app.jwt.expiration-ms=86400000

# ===== LOGGING =====
logging.level.com.hema.resumematcher=DEBUG
